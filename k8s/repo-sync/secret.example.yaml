# Copy to secret.yaml and fill in real values. Do NOT commit secret.yaml.
# Then: kubectl apply -f secret.yaml
#
# Or create secret via CLI (recommended - tokens never touch disk):
#   kubectl create secret generic repo-sync-tokens \
#     --from-literal=github-token='YOUR_GITHUB_PAT' \
#     --from-literal=azure-devops-pat='YOUR_AZURE_DEVOPS_PAT' \
#     --from-literal=azure-devops-org='your-org-name'
#
apiVersion: v1
kind: Secret
metadata:
  name: repo-sync-tokens
  namespace: repo-sync-temp
type: Opaque
stringData:
  github-token: "REPLACE_WITH_GITHUB_PAT"
  azure-devops-pat: "REPLACE_WITH_AZURE_DEVOPS_PAT"
  azure-devops-org: "leetclub"
