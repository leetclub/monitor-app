apiVersion: batch/v1
kind: Job
metadata:
  name: vendon-events-recache-2026-04-22
  namespace: leet-monitor
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: curl
          image: curlimages/curl:8.5.0
          imagePullPolicy: IfNotPresent
          env:
            - name: DASHBOARD_ACCESS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: people-analytics-secrets
                  key: dashboard-access-api-key
          command:
            - /bin/sh
            - -c
            - >
              exec curl -fsS
              --connect-timeout 10
              --max-time 900
              --retry 1
              -X POST "http://people-analytics-api/api/vendon/internal/cache-events"
              -H "Content-Type: application/json"
              -H "X-Dashboard-Access-Secret:${DASHBOARD_ACCESS_API_KEY}"
              -d '{"date":"2026-04-22"}'

