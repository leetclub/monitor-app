apiVersion: batch/v1
kind: Job
metadata:
  name: people-analytics-hourly-backfill-365d
  namespace: leet-monitor
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 21600 # 6 hours
  template:
    metadata:
      labels:
        app: people-analytics-sync
        job: people-analytics-hourly-backfill-365d
    spec:
      restartPolicy: Never
      containers:
      - name: sync
        image: programmeradmin25/people-analytics-sync:latest
        imagePullPolicy: Always
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-host
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-port
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-name
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-password
        - name: VIDEOLOFT_EMAIL
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: videoloft-email
              optional: true
        - name: VIDEOLOFT_USERNAME
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: videoloft-username
              optional: true
        - name: VIDEOLOFT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: videoloft-password
        - name: TIMEZONE
          value: "Asia/Kuwait"

        # Backfill config
        - name: SYNC_DAYS_BACK
          value: "365"
        - name: SYNC_INTERVAL
          value: "hour"   # will be sent to Videoloft as 3600000ms
        - name: SYNC_CHUNK_DAYS
          value: "7"      # fetch in 7-day chunks to avoid timeouts/huge payloads

        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"


