# Initial Full Sync Job - Fetches all historical data
# Use this for the first sync to get all available data
# 
# Usage: kubectl apply -f k8s/initial-sync-job.yaml -n leet-monitor
#
# This will sync 365 days back. Adjust SYNC_DAYS_BACK if needed.

apiVersion: batch/v1
kind: Job
metadata:
  name: people-analytics-sync-initial
  namespace: leet-monitor
spec:
  template:
    metadata:
      labels:
        app: people-analytics-sync
        sync-type: initial
    spec:
      restartPolicy: OnFailure
      containers:
      - name: sync
        image: programmeradmin25/people-analytics-sync:latest
        imagePullPolicy: Always
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-host
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-port
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-name
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-password
        - name: VIDEOLOFT_EMAIL
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: videoloft-email
              optional: true
        - name: VIDEOLOFT_USERNAME
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: videoloft-username
              optional: true
        - name: VIDEOLOFT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: videoloft-password
        - name: SYNC_DAYS_BACK
          value: "365"  # Sync 1 year of historical data
        - name: SYNC_INTERVAL
          value: "date"
        - name: TIMEZONE
          value: "Asia/Kuwait"
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      # Add timeout for long-running initial sync
      activeDeadlineSeconds: 3600  # 1 hour timeout

