apiVersion: batch/v1
kind: Job
metadata:
  name: people-analytics-hourly-backfill-2d-1382465
  namespace: leet-monitor
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: people-analytics-sync
        job: manual-backfill
    spec:
      restartPolicy: OnFailure
      containers:
      - name: sync
        image: programmeradmin25/people-analytics-sync:latest
        imagePullPolicy: Always
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-host
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-port
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-name
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-password
        - name: VIDEOLOFT_EMAIL
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: videoloft-email
              optional: true
        - name: VIDEOLOFT_USERNAME
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: videoloft-username
              optional: true
        - name: VIDEOLOFT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: videoloft-password
        - name: TIMEZONE
          value: "Asia/Kuwait"
        - name: SYNC_INTERVAL
          value: "hour"
        - name: SYNC_DAYS_BACK
          value: "2"
        - name: SYNC_UIDDS
          value: "1382465.8"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

