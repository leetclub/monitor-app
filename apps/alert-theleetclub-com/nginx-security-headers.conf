# Included in server / locations that set their own add_header (nginx drops parent add_header otherwise).
# Allows Google Sign-In / FedCM popup communication without COOP blocking window.postMessage noise.
add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), browsing-topics=()" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com https://*.google.com https://*.gstatic.com; style-src 'self' 'unsafe-inline' https://accounts.google.com https://*.gstatic.com; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https:; frame-src https://accounts.google.com https://*.google.com; worker-src 'self'; base-uri 'self'; form-action 'self'" always;

