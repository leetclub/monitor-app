apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alert-app-ingress
  namespace: leet-monitor
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: alert.theleetclub.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alert-app
                port:
                  number: 80
  tls:
    - hosts:
        - alert.theleetclub.com
      secretName: theleetclub-tls

