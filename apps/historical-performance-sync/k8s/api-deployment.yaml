apiVersion: apps/v1
kind: Deployment
metadata:
  name: historical-performance-api
  namespace: leet-monitor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: historical-performance-api
  template:
    metadata:
      labels:
        app: historical-performance-api
    spec:
      containers:
      - name: api
        image: programmeradmin25/historical-performance-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5002
          name: http
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-host
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-port
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-name
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-password
        - name: API_PORT
          value: "5002"
        - name: DEBUG
          value: "false"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5002
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 5002
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: historical-performance-api
  namespace: leet-monitor
spec:
  selector:
    app: historical-performance-api
  ports:
  - port: 80
    targetPort: 5002
    protocol: TCP
  type: ClusterIP

