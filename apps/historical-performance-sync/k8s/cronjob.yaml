apiVersion: batch/v1
kind: CronJob
metadata:
  name: historical-performance-sync
  namespace: leet-monitor
spec:
  schedule: "0 3 * * *"  # Run daily at 3 AM UTC
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: historical-performance-sync
        spec:
          restartPolicy: OnFailure
          containers:
          - name: sync
            image: programmeradmin25/historical-performance-sync:latest
            imagePullPolicy: Always
            command: ["sh", "-c", "cd /app && if [ -d historical-performance-sync ]; then cd historical-performance-sync && python sync_service.py; else python sync_service.py; fi"]
            workingDir: /app
            env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: people-analytics-secrets
                  key: db-host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: people-analytics-secrets
                  key: db-port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: people-analytics-secrets
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: people-analytics-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: people-analytics-secrets
                  key: db-password
            - name: VENDON_API_KEY
              valueFrom:
                secretKeyRef:
                  name: people-analytics-secrets
                  key: vendon-api-key
            - name: VENDON_API_BASE
              value: "https://cloud.vendon.net/rest/v1.9.0"
            - name: HISTORICAL_SYNC_DAYS_BACK
              value: "30"  # Sync last 30 days
            resources:
              requests:
                memory: "512Mi"
                cpu: "200m"
              limits:
                memory: "1Gi"
                cpu: "1000m"

