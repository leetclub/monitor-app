apiVersion: batch/v1
kind: Job
metadata:
  name: historical-performance-cleanup
  namespace: leet-monitor
spec:
  template:
    metadata:
      labels:
        app: historical-performance-cleanup
    spec:
      restartPolicy: OnFailure
      containers:
      - name: cleanup
        image: programmeradmin25/historical-performance-sync:latest
        imagePullPolicy: Always
        command: ["python3", "cleanup_old_records.py"]
        workingDir: /app
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-host
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-port
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-name
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-password
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

