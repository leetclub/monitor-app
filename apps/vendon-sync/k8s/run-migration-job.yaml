apiVersion: batch/v1
kind: Job
metadata:
  name: run-migration-sync-type
  namespace: leet-monitor
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: migration
        image: programmeradmin25/vendon-sales-api:latest
        imagePullPolicy: Always
        command: ["sh", "-c", "cd /app && python do_migration.py"]
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-host
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-port
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-name
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-password
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
