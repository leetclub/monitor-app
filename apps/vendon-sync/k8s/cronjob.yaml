apiVersion: batch/v1
kind: CronJob
metadata:
  name: vendon-sales-sync
  namespace: leet-monitor
spec:
  # Run daily at 2 AM UTC (5 AM Kuwait time) to sync yesterday's data
  # This ensures all of yesterday's data is complete
  schedule: "0 2 * * *"
  # Keep 3 successful and 1 failed job
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: vendon-sales-sync
        spec:
          restartPolicy: OnFailure
          containers:
          - name: sync
            image: programmeradmin25/people-analytics-sync:latest
            imagePullPolicy: Always
            command: ["sh", "-c", "cd /app && if [ -d vendon-sync ]; then cd vendon-sync && python sync_service.py; else echo 'ERROR: vendon-sync directory not found in image. Please rebuild image with vendon-sync code.' && exit 1; fi"]
            env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: people-analytics-secrets
                  key: db-host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: people-analytics-secrets
                  key: db-port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: people-analytics-secrets
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: people-analytics-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: people-analytics-secrets
                  key: db-password
            - name: VENDON_API_KEY
              valueFrom:
                secretKeyRef:
                  name: people-analytics-secrets
                  key: vendon-api-key
            - name: VENDON_API_BASE
              value: "https://cloud.vendon.net/rest/v1.9.0"
            - name: VENDON_SYNC_DAYS_BACK
              value: "1"  # Sync yesterday's data
            - name: ADMIN_API_URL
              value: "https://vendon-api.theleetclub.com"
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: people-analytics-secrets
                  key: admin-api-key
            resources:
              requests:
                memory: "256Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "500m"

