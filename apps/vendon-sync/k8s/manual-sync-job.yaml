apiVersion: batch/v1
kind: Job
metadata:
  name: vendon-sync-now
  namespace: leet-monitor
spec:
  template:
    metadata:
      labels:
        app: vendon-sales-sync
    spec:
      restartPolicy: OnFailure
      containers:
      - name: sync
        image: python:3.11-slim
        command:
        - sh
        - -c
        - |
          pip install -q psycopg2-binary requests sqlalchemy python-dotenv
          cp /code/sync_service.py /tmp/ && cp /code/models.py /tmp/
          cd /tmp && python sync_service.py
        volumeMounts:
        - name: code
          mountPath: /code
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-host
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-port
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-name
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: db-password
        - name: VENDON_API_KEY
          valueFrom:
            secretKeyRef:
              name: people-analytics-secrets
              key: vendon-api-key
        - name: VENDON_API_BASE
          value: "https://cloud.vendon.net/rest/v1.9.0"
        - name: VENDON_SYNC_DAYS_BACK
          value: "1"
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      volumes:
      - name: code
        configMap:
          name: vendon-sync-code
