# Copy to secret.yaml (do not commit real values). Apply: kubectl apply -f secret.yaml -n leet-monitor
# These values are for server-side use only — the SPA entrypoint does NOT inject them into /config.js.
# Rotate any credentials that were ever stored in plaintext (e.g. copied from Google Script Properties).
apiVersion: v1
kind: Secret
metadata:
  name: monitoring-app-v2-secrets
  namespace: leet-monitor
type: Opaque
stringData:
  API_KEY: "REPLACE_ME"
  DASHBOARD_ACCESS_API_KEY: "REPLACE_ME"
  SAFETY_CULTURE_API_TOKEN: "REPLACE_ME"
  SLACK_BOT_TOKEN: "REPLACE_ME"
  SLACK_COOKIE_HEADER: "REPLACE_ME"
  SLACK_COOKIE_TOKEN: "REPLACE_ME"
  SLACK_USER_TOKEN: "REPLACE_ME"
  SLACK_WEBHOOK_URL: "REPLACE_ME"
  SLACK_WORKSPACE_ID: "REPLACE_ME"
  SLACK_ISSUES_ACTIONS_LIST_ID: "REPLACE_ME"
  SLACK_MACHINES_LIST_ID: "REPLACE_ME"
  SLACK_STAFF_REQUESTS_LIST_ID: "REPLACE_ME"
  VENDON_USERNAME: "REPLACE_ME"
  VENDON_PASSWORD: "REPLACE_ME"
  VIDEOLOFT_EMAIL: "REPLACE_ME"
  VIDEOLOFT_PASSWORD: "REPLACE_ME"
  # Legacy / session blobs from GAS — not used by the React SPA unless you port server logic to a BFF
  ADMIN_SESSION: "REPLACE_ME"
  ADMIN_SESSION_COOKIE: "REPLACE_ME"
  ADMIN_SESSION_TOKEN: "REPLACE_ME"
  ACCESS_PERMISSIONS_ADMIN_EMAILS: "REPLACE_ME"
