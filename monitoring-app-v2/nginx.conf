server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_body_temp_path /tmp/nginx/client_temp;
    proxy_temp_path /tmp/nginx/proxy_temp;
    fastcgi_temp_path /tmp/nginx/fastcgi_temp;
    uwsgi_temp_path /tmp/nginx/uwsgi_temp;
    scgi_temp_path /tmp/nginx/scgi_temp;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;

    include /etc/nginx/includes/security-headers.conf;

    # Serve icon bytes directly — a 302 here can become http://host:8080/... behind TLS-terminating
    # ingress (wrong scheme/port), which breaks SW fetch + CSP connect-src for https pages.
    location = /favicon.ico {
        alias /usr/share/nginx/html/favicon.png;
        default_type image/png;
        include /etc/nginx/includes/security-headers.conf;
        expires 7d;
        add_header Cache-Control "public, immutable" always;
    }

    location = /index.html {
        include /etc/nginx/includes/security-headers.conf;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location = /config.js {
        include /etc/nginx/includes/security-headers.conf;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location = /manifest.webmanifest {
        include /etc/nginx/includes/security-headers.conf;
        add_header Cache-Control "public, max-age=3600" always;
        default_type application/manifest+json;
    }

    location = /sw.js {
        include /etc/nginx/includes/security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
        default_type application/javascript;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite entry chunk: must revalidate after deploys. Long "immutable" cache here causes 404s on
    # lazy-loaded chunks when users keep an old entry bundle but the server only has new hashes.
    location ~* ^/assets/index-[^/]+\.js$ {
        include /etc/nginx/includes/security-headers.conf;
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        include /etc/nginx/includes/security-headers.conf;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
